events { }
http {
    include mime.types;

    types {
        application/wasm wasm;
    }

    # Gzip compression (matches GitHub Pages / Fastly CDN behavior)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        application/xml
        application/octet-stream
        image/svg+xml
        font/woff2;

    server {
        listen 80;

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html =404;
        }

        # Pre-compressed Blazor files (.br and .gz)
        location /_framework/ {
            root /usr/share/nginx/html;
            gzip_static on;

            # Serve pre-compressed brotli files if available
            location ~ \.br$ {
                add_header Content-Encoding br;
                default_type application/octet-stream;
            }

            # Serve pre-compressed gzip files if available
            location ~ \.gz$ {
                add_header Content-Encoding gzip;
                default_type application/octet-stream;
            }
        }

        # Cache static assets
        location ~* \.(webp|png|jpg|jpeg|gif|ico|svg|css|js|wasm|woff2)$ {
            root /usr/share/nginx/html;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}